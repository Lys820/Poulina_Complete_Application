<header class="top-header">
  <div class="header-left">
    <div class="page-title">
      <h6>Poulina Group Holding</h6>
      <small>Laboratoire d'analyses</small>
    </div>
  </div>

  <div class="header-right">
    <!-- Cloche notifications -->
    <a [routerLink]="'/app/notifications'" class="notification-badge">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      @if (badgeService.unreadCount() > 0) {
        <span class="badge-count">{{ badgeService.unreadCount() }}</span>
      }
    </a>

    <!-- Profil utilisateur -->
    <div class="user-info" (click)="toggleDropdown()">
      <div class="avatar">{{ userInitials }}</div>
      <div class="user-details">
        <span>{{ userName }}</span>
        <span>{{ userRole }}</span>
      </div>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="chevron"
        [class.rotated]="showDropdown"
      >
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </div>

    <!-- Dropdown profil -->
    @if (showDropdown) {
      <div class="profile-dropdown">
        <!-- En-tête utilisateur -->
        <div class="dropdown-header">
          <div class="dropdown-avatar">{{ userInitials }}</div>
          <div class="dropdown-user-info">
            <strong>{{ userName }}</strong>
            <span class="dropdown-role">{{ userRole }}</span>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <!-- Items -->
        <div class="dropdown-menu-items">
          <a routerLink="/app/profile" class="dropdown-item-custom" (click)="showDropdown = false">
            <div class="item-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <span>Mon profil</span>
          </a>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item-custom item-danger" (click)="logout()">
            <div class="item-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
            </div>
            <span>Déconnexion</span>
          </button>
        </div>
      </div>
    }
  </div>
</header>
